name: Build & Release

# Pushing a version tag (e.g. v1.2.3) builds the Windows .exe and publishes a
# GitHub Release under that tag name with a short bullet-point changelog.
# Manual runs (workflow_dispatch) also build the artifact without releasing.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write        # needed to create tags/releases and upload the .exe

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history + tags so we can build the changelog
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Work out the version number
        id: ver
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            v="${{ github.ref_name }}"                       # use the pushed tag as-is
          else
            base=$(python -c "import re;m=re.search(r'^version\s*=\s*\"(\d+)\.(\d+)',open('pyproject.toml').read(),re.M);print(m.group(1)+'.'+m.group(2))")
            v="v${base}.$(git rev-list --count HEAD)"        # major.minor + commit count (artifact only)
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          printf 'VERSION = "%s"\n' "$v" > src/irtracker/_buildinfo.py
          echo "Building $v"

      - name: Install the app and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[gui,sim,toast]"
          python -m pip install pyinstaller

      - name: Build the .exe
        run: >
          python -m PyInstaller --noconfirm --clean
          --onefile --windowed
          --name iRacingConfigTracker
          --icon packaging/icon.ico
          --add-data "src/irtracker/webui;irtracker/webui"
          --collect-all webview
          --collect-all clr_loader
          --collect-all pythonnet
          --collect-all bottle
          --collect-all proxy_tools
          --collect-all fpdf
          --collect-all pystray
          --collect-all PIL
          packaging/launcher.py

      - name: Generate SHA-256 checksum
        shell: pwsh
        run: |
          $exe = "dist/iRacingConfigTracker.exe"
          (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower() + "  iRacingConfigTracker.exe" `
            | Out-File -Encoding ascii "dist/iRacingConfigTracker.exe.sha256"

      - name: Write release notes
        id: notes
        if: github.ref_type == 'tag'
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$prev" ]; then range="$prev..HEAD"; else range="HEAD"; fi
          {
            echo "notes<<NOTES_EOF"
            echo "### What's new in $VERSION"
            echo ""
            git log "$range" --no-merges --pretty=format:'- %s' | head -15
            echo ""
            echo ""
            echo "_Automated build from commit \`${GITHUB_SHA::7}\`. Download \`iRacingConfigTracker.exe\` below._"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: iRacingConfigTracker
          path: |
            dist/iRacingConfigTracker.exe
            dist/iRacingConfigTracker.exe.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          fail_on_unmatched_files: true
          files: |
            dist/iRacingConfigTracker.exe
            dist/iRacingConfigTracker.exe.sha256
